services:
  webapp:
    build:
      context: .
      dockerfile: webapp/Dockerfile
    ports:
      - "18080:8000"
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
      ENABLE_OPENAI_FEEDBACK: auto
      OPENAI_MODEL: gpt-4o-mini
      FLASK_DEBUG: "1"
    env_file:
      - webapp/.env
    volumes:
      - ./webapp:/app/webapp
      - ./outputs:/app/outputs
    command: ["python", "backend/app.py"]
    restart: unless-stopped
